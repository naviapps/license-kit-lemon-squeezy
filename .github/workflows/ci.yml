name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    name: SwiftPM
    runs-on: macos-15
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Check out LicenseKit
        uses: actions/checkout@v7
        with:
          repository: naviapps/license-kit
          path: .deps/license-kit
          persist-credentials: false

      - name: Show Swift version
        run: swift --version

      - name: Run checks
        run: make check
        env:
          LICENSE_KIT_PATH: ${{ github.workspace }}/.deps/license-kit

  platform-build:
    name: Release (${{ matrix.platform }})
    runs-on: macos-15
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        platform:
          - iOS
          - tvOS
          - watchOS
          - visionOS

    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Check out LicenseKit
        uses: actions/checkout@v7
        with:
          repository: naviapps/license-kit
          path: .deps/license-kit
          persist-credentials: false

      - name: Build Release
        run: >-
          xcodebuild -quiet
          -scheme LicenseKitLemonSqueezy
          -configuration Release
          -destination "generic/platform=${{ matrix.platform }}"
          CODE_SIGNING_ALLOWED=NO
          build
        env:
          LICENSE_KIT_PATH: ${{ github.workspace }}/.deps/license-kit
